<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<title>Voluntários</title>
		<link rel="stylesheet" href="../css/telainicial.css" />
	</head>
	<body>
		<div class="topbar">
			<img src="../images/logo.png" class="logo-img" />
			<div class="user">Name</div>
		</div>
		<div class="container">
			<h2>Voluntários</h2>
			<div class="filtros">
				<input type="text" id="buscaRA" placeholder="Buscar por RA" />
				<div class="filtro-status">
					<button
						class="filtro-btn ativo-btn selected"
						onclick="filtrarStatus('ativo', this)">
						Ativo
					</button>
					<button
						class="filtro-btn inativo-btn"
						onclick="filtrarStatus('inativo', this)">
						Inativo
					</button>
				</div>
			</div>
			<div id="lista"></div>
		</div>
		<div class="footer-buttons">
			<button onclick="irCadastro()">Cadastrar Voluntário</button>
			<button onclick="irCronograma()">Cronogramas</button>
		</div>
		<script src="../js/dashboard.js"></script>
	</body>
</html>
